apply plugin: 'java'
apply plugin: 'application'

group = 'com.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.seleniumhq.selenium:selenium-java:4.29.0'
    testImplementation 'junit:junit:4.13.2'
}

// IMPORTANT: old syntax
mainClassName = 'com.example.App'

test {
    useJUnit()
}
